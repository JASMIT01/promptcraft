{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white border border-slate-200 p-8 rounded-xl shadow-sm mt-12">
    <h2 class="text-2xl font-bold text-slate-900 mb-2 text-center">Get Started</h2>
    <p class="text-sm text-slate-500 text-center mb-6">Create a free account to start generating AI items.</p>
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Username</label>
            <input type="text" name="username" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500" required>
        </div>
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Password</label>
            <input type="password" name="password" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500" required>
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-2.5 rounded-lg hover:bg-indigo-700 transition shadow-sm">Create Account</button>
    </form>
</div>
{% endblock %}

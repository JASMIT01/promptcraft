{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white border border-slate-200 p-8 rounded-xl shadow-sm mt-12">
    <h2 class="text-2xl font-bold text-slate-900 mb-2 text-center">Welcome Back</h2>
    <p class="text-sm text-slate-500 text-center mb-6">Log into your workspace dashboard.</p>
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Username</label>
            <input type="text" name="username" class="w-full px-3 py-2 text-slate-900 border border-slate-300 rounded-lg..." required>
        </div>
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Password</label>
           <input type="password" name="password" class="w-full px-3 py-2 text-slate-900 border border-slate-300 rounded-lg..." required>
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-2.5 rounded-lg hover:bg-indigo-700 transition shadow-sm">Sign In</button>
        <div class="mt-4 text-center text-sm text-slate-600">
        Don't have an account? 
        <a href="{{ url_for('register') }}" class="text-indigo-600 hover:underline font-semibold">Sign up</a>
    </div>
    </form>
</div>
{% endblock %}

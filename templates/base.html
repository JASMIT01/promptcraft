<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptCraft // AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-950 via-blue-950 to-black min-h-screen text-white font-sans selection:bg-indigo-500">
    
    <nav class="p-6 flex justify-between items-center border-b border-white/10 bg-black/30 backdrop-blur-md">
        <h1 class="text-2xl font-bold tracking-tighter bg-gradient-to-r from-blue-400 to-indigo-400 text-transparent bg-clip-text">PROMPTCRAFT // AI</h1>
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('logout') }}" class="text-sm bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full transition-all border border-white/10">Logout</a>
        {% endif %}
    </nav>

    {% block content %}{% endblock %}

</body>
</html>
